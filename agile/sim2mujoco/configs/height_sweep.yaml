# Height sweep test
# Tests robot's ability to track different standing heights
# Command changes every 2 seconds
evaluation:
  task_name: "g1_velocity_height"
  num_envs: 1
  episode_length_s: 30.0
  num_episodes: 1
  environments:
    - env_ids: [0]
      name: "height_sweep"
      sweep:
        interval: 2.0
        commands:
          base_velocity:
            lin_vel_x: 0.0
            lin_vel_y: 0.0
            ang_vel_z: 0.0
            base_height: [0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.72]
